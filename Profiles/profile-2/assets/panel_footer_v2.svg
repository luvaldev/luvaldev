<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%">
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6; }
    .text { font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; font-size: 15px; font-weight: 600; white-space: pre; }
    
    .wave1 { fill: #38bdf8; animation: move1 3s linear infinite; }
    .wave2 { fill: #818cf8; animation: move2 5s linear infinite; }
    .wave3 { fill: #c084fc; animation: move3 7s linear infinite; }
    
    @keyframes move1 { 0% { transform: translateX(0px); } 100% { transform: translateX(-144px); } }
    @keyframes move2 { 0% { transform: translateX(0px); } 100% { transform: translateX(-216px); } }
    @keyframes move3 { 0% { transform: translateX(0px); } 100% { transform: translateX(-288px); } }
  </style>
  <rect x="1" y="1" width="798" height="148" class="bg" />
  
  <g transform="translate(0, 0)">
    <text x="20" y="40" class="text" fill="#8b949e">~ $ <tspan fill="#56d364" font-weight="600">./render_wave.sh --parallax --speed=fast</tspan></text>
  </g>
  
  <clipPath id="clip">
    <rect x="1" y="50" width="798" height="100" rx="6" />
  </clipPath>
  
  <g clip-path="url(#clip)">
    <!-- Layer 3 (Back) -->
    <text x="0" y="130" class="text wave3" textLength="1728" lengthAdjust="spacingAndGlyphs" xml:space="preserve">____.-'                '-.__________.-'                '-.__________.-'                '-.__________.-'                '-.__________.-'                '-.__________.-'                '-.______</text>
    
    <!-- Layer 2 (Mid) -->
    <text x="0" y="105" class="text wave2" textLength="1728" lengthAdjust="spacingAndGlyphs" xml:space="preserve">_.-'   `'-._           _.-'   `'-._           _.-'   `'-._           _.-'   `'-._           _.-'   `'-._           _.-'   `'-._           _.-'   `'-._           _.-'   `'-._           </text>
    
    <!-- Layer 1 (Front) -->
    <text x="0" y="80" class="text wave1" textLength="1440" lengthAdjust="spacingAndGlyphs" xml:space="preserve">~*~.            ~*~.            ~*~.            ~*~.            ~*~.            ~*~.            ~*~.            ~*~.            ~*~.            ~*~.            </text>
  </g>
</svg>