<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 150" width="100%">
  <defs>
    <linearGradient id="pg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f47067"/>
      <stop offset="0.5" stop-color="#d2a8ff"/>
      <stop offset="1" stop-color="#6cb6ff"/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #0d1117; stroke: #30363d; stroke-width: 1; rx: 6; }
    .text { font-family: 'Fira Code', 'JetBrains Mono', 'Courier New', monospace; font-size: 15px; font-weight: 600; white-space: pre; }
    
    .wave-front { fill: url(#pg); animation: move-fw 3.5s linear infinite; }
    .wave-back { fill: url(#pg); animation: move-bw 5s linear infinite; opacity: 0.4; }
    
    @keyframes move-fw { 0% { transform: translateX(0px); } 100% { transform: translateX(-288px); } }
    @keyframes move-bw { 0% { transform: translateX(0px); } 100% { transform: translateX(-216px); } }
  </style>
  <rect x="1" y="1" width="798" height="148" class="bg" />
  
  <g transform="translate(0, 0)">
    <text x="20" y="40" class="text" fill="#8b949e">~ $ <tspan fill="#56d364" font-weight="600">./render_wave.sh --style=neofetch --animate</tspan></text>
  </g>
  
  <clipPath id="clip">
    <rect x="1" y="50" width="798" height="100" rx="6" />
  </clipPath>
  
  <g clip-path="url(#clip)">
    <!-- Back Wave -->
    <g class="wave-back">
